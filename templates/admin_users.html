<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>HomeVault - Users</title>
        <link rel="stylesheet" href="/static/css/style.css" />
    </head>
    <body>
        <div class="container">
            <h1>HomeVault</h1>

            <div class="filter-buttons" style="margin-top: 20px;">
                <a href="/" class="btn btn-primary">My Files</a>
                <a href="/admin/users" class="btn btn-active">Manage Users</a>
                <a href="/register" class="btn btn-primary">Add User</a>
                <a href="/logout" class="btn btn-danger">Logout</a>
            </div>

            <h2>All Users ({{ users|length }})</h2>

            {% if users %}
            <table class="files-table">
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Created</th>
                    <th>Action</th>
                </tr>
                {% for user in users %}
                <tr>
                    <td>{{ user['username'] }}</td>
                    <td>{{ user['role'] }}</td>
                    <td>{{ user['created_at'] }}</td>
                    <td>
                        <a href="/admin/user/{{ user['id'] }}" class="btn btn-primary">View Files</a>
                    </td>
                </tr>
                {% endfor %}
            </table>
            {% endif %}
        </div>
    </body>
</html>
